name: credit_karnet
description: "Application de gestion de crédit - Karnet"
publish_to: "none"
version: 2.0.0+2

environment:
  sdk: ^3.5.0

dependencies:
  http: ^1.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database & Storage
  sqflite: ^2.3.0
  crypto: ^3.0.7
  path: ^1.9.0
  shared_preferences: ^2.3.0
  path_provider:
    ^2.1.4

    # Firebase
  firebase_core: ^3.15.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  connectivity_plus: ^5.0.2

  # UI
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Localization
  intl: ^0.20.2

  # Media & Files
  image_picker: ^1.1.2
  pdf: ^3.10.8
  printing: ^5.14.3
  encrypt: ^5.0.3

  # Utils
  url_launcher: ^6.3.0

  # Notifications
  awesome_notifications: ^0.11.0
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/fonts/ # ← زيد هاد
fonts:
  - family: Cairo
    fonts:
      - asset: assets/fonts/Cairo-Regular.ttf
      - asset: assets/fonts/Cairo-Bold.ttf
        weight: 700
